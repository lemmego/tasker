name: tasker CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'tasker/**'
      - 'go.work'
      - 'go.work.sum'
  pull_request:
    branches: [develop, main]
    paths:
      - 'tasker/**'
      - 'go.work'
      - 'go.work.sum'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25', '1.26']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Sync workspace
        run: go work sync

      - name: Tidy check
        run: |
          cd tasker && go mod tidy
          test -z "$(git diff --name-only)" || (echo "go.mod/go.sum not in sync" && exit 1)

      - name: Build
        run: go build ./tasker/...

      - name: Vet
        run: go vet ./tasker/...

      - name: Test
        run: go test -race -count=1 ./tasker/...
